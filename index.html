<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公司常用软件下载站</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1 class="site-title">📦 公司常用软件下载站</h1>
      <p class="site-subtitle">Windows 必备软件合集 · 一键直达官网下载</p>
    </div>
  </header>

  <main class="main">
    <div class="section pinned-section" id="pinnedSection">
      <h2 class="section-title">📌 常用文档</h2>
      <div class="grid grid-pinned" id="pinnedGrid"></div>
    </div>

    <div class="toolbar">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" class="search-input" placeholder="搜索软件名称..." autocomplete="off">
        <button class="search-clear" id="searchClear" title="清除">✕</button>
      </div>
      <div class="filters" id="filters"></div>
    </div>

    <div class="grid" id="softwareGrid">
      <div class="loading">正在加载软件列表...</div>
    </div>
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="empty-icon">📭</div>
      <p>没有找到匹配的软件</p>
    </div>
  </main>

  <footer class="footer">
    <p>本站所有软件均来自官方网站或公司内部，仅供内部使用</p>
    <p class="footer-small">Powered by GitHub Pages</p>
  </footer>

  <script>
  (function(){
    var data=null,activeCategory="all";

    function renderPinned(pinned){
      if(!pinned||!pinned.length){
        document.getElementById("pinnedSection").style.display="none";
        return;
      }
      var grid=document.getElementById("pinnedGrid");
      grid.innerHTML=pinned.map(function(x){
        return '<div class="card card-pinned">'+
          '<div class="card-icon">'+(x.icon||"📄")+'</div>'+
          '<div class="card-body">'+
            '<h3 class="card-title">'+x.name+'</h3>'+
            '<p class="card-desc">'+x.description+'</p>'+
          '</div>'+
          '<div class="card-actions">'+
            '<a href="'+x.download_url+'" class="btn-download btn-doc">📥 下载</a>'+
          '</div>'+
        '</div>';
      }).join("");
    }

    function renderFilters(cats){
      var c=document.getElementById("filters");
      var h='<button class="filter-btn active" data-cat="all">全部</button>';
      cats.forEach(function(cat){
        h+='<button class="filter-btn" data-cat="'+cat+'">'+cat+'</button>';
      });
      c.innerHTML=h;
      c.querySelectorAll(".filter-btn").forEach(function(b){
        b.addEventListener("click",function(){
          c.querySelectorAll(".filter-btn").forEach(function(x){x.classList.remove("active")});
          b.classList.add("active");
          activeCategory=b.dataset.cat;
          renderGrid();
        });
      });
    }

    function renderGrid(){
      var grid=document.getElementById("softwareGrid");
      var empty=document.getElementById("emptyState");
      var s=document.getElementById("searchInput").value.toLowerCase().trim();

      var filtered=data.software.filter(function(x){
        var mc=activeCategory==="all"||x.category===activeCategory;
        var ms=!s||x.name.toLowerCase().indexOf(s)>=0||x.name_en.toLowerCase().indexOf(s)>=0||x.description.toLowerCase().indexOf(s)>=0;
        return mc&&ms;
      });

      if(!filtered.length){grid.innerHTML="";empty.style.display="block";return;}
      empty.style.display="none";

      grid.innerHTML=filtered.map(function(x){
        var isLink=x.download_type==="link";
        var label=isLink?"🔗 官网下载":"⬇ 直接下载";
        var cls=isLink?"btn-download btn-link":"btn-download btn-local";
        return '<div class="card">'+
          '<div class="card-icon">'+(x.icon||"📦")+'</div>'+
          '<div class="card-body">'+
            '<h3 class="card-title">'+x.name+'</h3>'+
            '<p class="card-name-en">'+x.name_en+'</p>'+
            '<p class="card-desc">'+x.description+'</p>'+
            '<div class="card-meta">'+
              '<span class="badge badge-cat">'+x.category+'</span>'+
            '</div>'+
          '</div>'+
          '<div class="card-actions">'+
            '<a href="'+x.download_url+'" class="'+cls+'" target="_blank" rel="noopener">'+label+'</a>'+
          '</div>'+
        '</div>';
      }).join("");
    }

    fetch("software.json")
      .then(function(r){return r.json();})
      .then(function(j){
        data=j;
        renderPinned(j.pinned);
        var cats=[];
        j.software.forEach(function(x){
          if(cats.indexOf(x.category)===-1) cats.push(x.category);
        });
        renderFilters(cats);
        renderGrid();
      })
      .catch(function(e){
        document.getElementById("softwareGrid").innerHTML='<div class="loading error">⚠️ 加载失败：'+e.message+'</div>';
      });

    document.getElementById("searchInput").addEventListener("input",renderGrid);
    document.getElementById("searchClear").addEventListener("click",function(){
      document.getElementById("searchInput").value="";
      renderGrid();
    });
  })();
  </script>
</body>
</html>
